<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Який ти котик ФТІТ?</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EF;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #7A7A8C;
    --accent: #2F3D88;
    --accent-light: #E5E8F5;
    --border: rgba(26,26,46,0.1);
    --radius: 16px;
  }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    max-width: 560px;
  }

  .badge {
    display: inline-block;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: var(--accent);
    color: #fff;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.05);
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--accent-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'Unbounded', sans-serif;
  }

  .q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt-btn {
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    font-family: 'Geologica', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.5;
  }

  .opt-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(3px);
  }

  .opt-btn.picked {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: translateX(3px);
  }

  /* RESULT */
  .result-emoji {
    font-size: 56px;
    display: block;
    text-align: center;
    margin-bottom: 1rem;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }

  .result-name {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
    text-align: center;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .result-program {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .result-desc-box {
    background: var(--accent-light);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    font-size: 14px;
    line-height: 1.7;
    color: #2a3570;
    margin-bottom: 1.5rem;
  }

  .others-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Unbounded', sans-serif;
    margin-bottom: 10px;
  }

  .other-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .other-item:last-child { border-bottom: none; }

  .other-emoji { font-size: 18px; width: 24px; text-align: center; }

  .other-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }

  .other-bar-wrap {
    width: 80px;
    height: 5px;
    background: var(--accent-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .other-bar {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    opacity: 0.5;
  }

  .restart-btn {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 26px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 0.82; }

  .cat-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 1.25rem;
    display: block;
  }

  footer {
    margin-top: auto;
    padding-top: 2rem;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  @media (max-width: 480px) {
    .card { padding: 1.5rem; }
  }
</style>
</head>
<body>


<header>
  <div class="badge">Квіз для абітурієнтів</div>
  <h1>Який ти <span>котик ФТІТ</span>?</h1>
  <p class="subtitle">Дай відповідь — і ми підберемо спеціальність саме для тебе</p>
</header>

<div class="card" id="card">
  <div id="quiz-area"></div>
</div>

<footer>Факультет транспортних та інформаційних технологій</footer>

<script>
const specs = {
  B13: { name: "Бібліотечна, інформаційна та архівна справа", programs: [
    { name: "Управління інформаційно-аналітичною діяльністю та комунікації з громадськістю", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=3" }
  ], emoji: "📚", desc: "Ти — охоронець знань і майстер пошуку інформації. Тебе цікавить, як організовувати, зберігати та поширювати знання. З нами вся важлива інформація буде належним чином упорядкована!" },
  F2:  { name: "Інженерія програмного забезпечення", programs: [
    { name: "Інженерія програмного забезпечення", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=4" }
  ], emoji: "💻", desc: "Ти — будівничий цифрового світу. Код для тебе — це мова, якою можна сказати все. Ти любиш структуру, чисту архітектуру і те, коли все працює як годинник." },
  F3:  { name: "Комп'ютерні науки", programs: [
    { name: "Комп'ютерні науки та штучний інтелект", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=5" },
    { name: "Комп'ютерні технології обробки даних", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=6" }
  ], emoji: "🤖", desc: "Ти — дослідник майбутнього. Тебе захоплює, як машини навчаються мислити. Алгоритми, дані, моделі — твоя стихія." },
  G7:  { name: "Автоматизація, комп'ютерно-інтегровані технології та робототехніка", programs: [
    { name: "Робототехніка та комп'ютеризовані системи управління", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=7" }
  ], emoji: "🦾", desc: "Ти — інженер, що оживляє машини. Тебе тягне до фізичного світу: мікроконтролери, датчики, маніпулятори. Ти хочеш, щоб твій код рухав реальні об'єкти." },
  J8:  { name: "Автомобільний транспорт", programs: [
    { name: "Автомобільні перевезення та транспортні технології", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=8" },
    { name: "Організація міжнародних перевезень", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=9" },
    { name: "Митна справа у транспортній галузі", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=10" },
    { name: "Транспортно-логістичні системи вантажних автомобільних перевезень", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=11" },
    { name: "Розумний транспорт і логістика для міст", url: "https://KucherP.github.io/ftit-quiz/docs/FTIT.pdf#page=12" }
  ], emoji: "🚗", desc: "Ти — людина руху. Тобі цікаво, як влаштовані транспортні системи, логістика та автомобільна техніка. Ти хочеш, щоб світ рухався ефективніше." }
};

const BASE_URL = 'https://KucherP.github.io/ftit-quiz';

const questions = [
  // 1
  {
    text: "Обери свій настрій на сьогодні",
    mood: true,
    options: [
      { scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } }
    ]
  },
  // 5
  {
    text: "Якби ти міг обрати одну суперсилу — яку б взяв?",
    options: [
      { text: "Чути, про що думають рослини", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Ніколи не втрачати шкарпетки", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Розуміти, про що мріє твій кіт", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Завжди знати, де пульт від телевізора", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Безкоштовно їсти піцу в будь-який час", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } }
    ]
  },
  // 2
  {
    text: "Якби можна було завантажити в мозок навички одного фахівця — чиї б ти взяв?",
    options: [
      { text: "Того, хто вміє знаходити, впорядковувати і зберігати будь-яку інформацію", scores: { B13: 3, F2: 1, F3: 1, G7: 0, J8: 0 } },
      { text: "Того, хто пише програми і створює додатки з нуля", scores: { B13: 0, F2: 3, F3: 1, G7: 1, J8: 0 } },
      { text: "Того, хто розв'язує складні логічні задачі і працює з даними", scores: { B13: 0, F2: 0, F3: 3, G7: 1, J8: 1 } },
      { text: "Того, хто збирає роботів і автоматизує все навколо", scores: { B13: 1, F2: 0, F3: 0, G7: 3, J8: 1 } },
      { text: "Того, хто розбирається в техніці і знає все про транспорт", scores: { B13: 1, F2: 1, F3: 0, G7: 0, J8: 3 } }
    ]
  },
  // 4
  {
    text: "Ти граєш у відеогру. Який стиль гри тобі найближчий?",
    options: [
      { text: "Збираю всі предмети, читаю кожен опис і вивчаю лор гри до найменших деталей", scores: { B13: 3, F2: 1, F3: 1, G7: 0, J8: 0 } },
      { text: "Шукаю баги та нестандартні рішення — цікаво, як гра влаштована зсередини", scores: { B13: 0, F2: 3, F3: 1, G7: 1, J8: 0 } },
      { text: "Будую оптимальну стратегію — рахую ресурси, прораховую кроки наперед", scores: { B13: 0, F2: 0, F3: 3, G7: 1, J8: 1 } },
      { text: "Люблю будувати бази, автоматизувати процеси або керувати складними механізмами", scores: { B13: 1, F2: 0, F3: 0, G7: 3, J8: 1 } },
      { text: "Вибираю ігри з транспортом — люблю продумувати маршрути, динамічний рух і визначати варіанти, як дістатися швидше", scores: { B13: 1, F2: 1, F3: 0, G7: 0, J8: 3 } }
    ]
  },
  // 3
  {
    text: "Що тебе найбільше приваблює у майбутній професії?",
    options: [
      { text: "Бути тим, хто знає відповідь на будь-яке питання", scores: { B13: 3, F2: 1, F3: 1, G7: 0, J8: 0 } },
      { text: "Зробити щось, чим користуватимуться мільйони", scores: { B13: 0, F2: 3, F3: 1, G7: 1, J8: 0 } },
      { text: "Перетворювати цифри на висновки, які всіх дивують", scores: { B13: 0, F2: 0, F3: 3, G7: 1, J8: 1 } },
      { text: "Автоматизувати все, що можна автоматизувати", scores: { B13: 1, F2: 0, F3: 0, G7: 3, J8: 1 } },
      { text: "Будувати логістику, яка працює як годинник", scores: { B13: 1, F2: 1, F3: 0, G7: 0, J8: 3 } }
    ]
  },
  // 8
  {
    text: "Якби тобі потрібно було вибрати фільм для кіновечору — що б ти обрав?",
    movie: true,
    options: [
      { img: `${BASE_URL}/movie/1.jpg`, scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { img: `${BASE_URL}/movie/2.jpg`, scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { img: `${BASE_URL}/movie/3.jpg`, scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { img: `${BASE_URL}/movie/4.jpg`, scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } }
    ]
  },
  // 6
  {
    text: "Ти провалився в паралельний вимір. Перше, що робиш",
    options: [
      { text: "Шукаю місцевий аналог Google — треба терміново зорієнтуватись", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Перевіряю чи працює тут Wi-Fi", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Фоткаю все підряд — потім розберусь, що це було", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Знаходжу місцевого і намагаюсь пояснити звідки я жестами", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } },
      { text: "Сідаю і чекаю — може само розсмокчеться", scores: { B13: 1, F2: 1, F3: 1, G7: 1, J8: 1 } }
    ]
  },
  // 7
  {
    text: "Вчитель розбив клас на команди для великого проєкту. Яка роль тобі найближча?",
    options: [
      { text: "Через годину маю 15 вкладок і повний конспект", scores: { B13: 3, F2: 1, F3: 1, G7: 0, J8: 0 } },
      { text: "Той, хто робить презентацію, поки всі сплять", scores: { B13: 0, F2: 3, F3: 1, G7: 1, J8: 0 } },
      { text: "Поки всі панікують — я вже порахував, як це вирішити", scores: { B13: 0, F2: 0, F3: 3, G7: 1, J8: 1 } },
      { text: "В будь-якій ситуації дістаю мультитул з рюкзака", scores: { B13: 1, F2: 0, F3: 0, G7: 3, J8: 1 } },
      { text: "Без мене ніхто б не знав, коли здавати і де збиратись", scores: { B13: 1, F2: 1, F3: 0, G7: 0, J8: 3 } }
    ]
  }
];

let current = 0;
let scores = {};
Object.keys(specs).forEach(k => scores[k] = 0);

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function render() {
  const area = document.getElementById('quiz-area');
  if (current >= questions.length) { renderResult(area); return; }
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  let optionsHtml;
  if (q.mood) {
    let moodImgs = [];
    try {
      const res = await fetch(`${BASE_URL}/cats/mood/index.json`);
      if (res.ok) {
        const files = await res.json();
        const shuffled = files.sort(() => Math.random() - 0.5);
        moodImgs = shuffled.slice(0, 4).map(f => `${BASE_URL}/cats/mood/${f}`);
      }
    } catch {}
    if (!moodImgs.length) {
      moodImgs = [1,2,3,4].map(i => `https://cataas.com/cat?${Date.now() + i}`);
    }
    const moodOptions = q.options.length ? q.options : [{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}},{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}},{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}},{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}}];
    optionsHtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${moodImgs.map((img, i) => `
        <button class="opt-btn" data-scores='${JSON.stringify(moodOptions[i]?.scores || moodOptions[0].scores)}' onclick="choose(this)" style="padding:0;overflow:hidden;border-radius:12px;aspect-ratio:1/1;background:var(--bg);">
          <img src="${img}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:10px;" alt="кіт ${i+1}">
        </button>`).join('')}
    </div>`;
  } else if (q.movie) {
    const shuffledMovie = shuffleArray(q.options);
    optionsHtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${shuffledMovie.map((o) => `
        <button class="opt-btn" data-scores='${JSON.stringify(o.scores)}' onclick="choose(this)" style="padding:0;overflow:hidden;border-radius:12px;aspect-ratio:2/3;background:var(--bg);">
          <img src="${o.img}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:10px;" alt="фільм">
        </button>`).join('')}
    </div>`;
  } else {
    const shuffled = shuffleArray(q.options);
    optionsHtml = `<div class="options">
      ${shuffled.map((o) => `<button class="opt-btn" data-scores='${JSON.stringify(o.scores)}' onclick="choose(this)">${o.text}</button>`).join('')}
    </div>`;
  }

  area.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${current + 1} / ${questions.length}</span>
    </div>
    <div class="q-text">${q.text}</div>
    ${optionsHtml}`;
}

function choose(btn) {
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btn.classList.add('picked');
  const s = JSON.parse(btn.dataset.scores);
  Object.entries(s).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  setTimeout(() => { current++; render(); }, 320);
}

// ── Google Sheets logging ──────────────────────────────────────────
// Встав свій Apps Script URL замість цього рядка:
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdoLA41LDduS5Xgn75MXOAw0BjgPz_yMKkt-4ztVkmaEq_qYv1lzP2HbqV0Q2Ms5TY/exec';

function logToSheets(specKey, specName) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  const now = new Date();
  const dateStr = now.toLocaleDateString('uk-UA');
  const timeStr = now.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
  const payload = {
    result_code: specKey,
    result_name: specName,
    date: dateStr,
    time: timeStr,
  };
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).catch(() => {}); // тихо ігноруємо помилки мережі
}
// ──────────────────────────────────────────────────────────────────

async function getRandomCatImg(specKey) {
  try {
    const res = await fetch(`${BASE_URL}/cats/${specKey}/index.json`);
    if (!res.ok) return null;
    const files = await res.json();
    if (!files || !files.length) return null;
    const file = files[Math.floor(Math.random() * files.length)];
    return `${BASE_URL}/cats/${specKey}/${file}`;
  } catch {
    return null;
  }
}

async function renderResult(area) {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const [topKey] = sorted[0];
  const sp = specs[topKey];
  logToSheets(topKey, sp.name);
  const maxScore = sorted[0][1] || 1;

  const othersHtml = sorted.slice(1, 5).map(([k, v]) => {
    const s = specs[k];
    const pct = Math.round((v / maxScore) * 100);
    return `<div class="other-item">
      <span class="other-emoji">${s.emoji}</span>
      <span class="other-name">${s.name}</span>
      <div class="other-bar-wrap"><div class="other-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const imgSrc = await getRandomCatImg(topKey);
  const imgHtml = imgSrc ? `<img class="cat-img" src="${imgSrc}" alt="котик">` : '';

  const programsHtml = `
    <div style="margin-bottom:1.5rem;">
      <div class="others-title" style="margin-bottom:8px;">Освітні програми</div>
      ${sp.programs.map(p => `
        <div style="display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid var(--border);">
          <span style="color:var(--accent); font-size:16px; line-height:1.4;">▸</span>
          <a href="${p.url}" target="_blank" style="font-size:13px; color:var(--accent); line-height:1.5; text-decoration:underline; text-underline-offset:3px; cursor:pointer;">${p.name}</a>
        </div>`).join('')}
    </div>`;

  const imgBlock = imgSrc ? `
    <div style="margin-bottom:1.5rem;">
      <div style="margin-bottom:0.75rem;">
        <div style="font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;">Твоя спеціальність</div>
        <div style="font-family:'Unbounded',sans-serif;font-size:clamp(13px,3vw,17px);font-weight:700;color:var(--text);line-height:1.3;">${sp.emoji} ${topKey} — ${sp.name}</div>
      </div>
      <img src="${imgSrc}" alt="котик" style="width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;display:block;">
    </div>` : `
    <div style="margin-bottom:1.5rem;">
      <div style="font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;">Твоя спеціальність</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:clamp(13px,3vw,17px);font-weight:700;color:var(--text);line-height:1.3;">${sp.emoji} ${topKey} — ${sp.name}</div>
    </div>`;

  area.innerHTML = `
    ${imgBlock}
    <div class="result-desc-box">${sp.desc}</div>
    ${programsHtml}
    <div class="others-title">Також підходять</div>
    ${othersHtml}
    <div style="display:flex;gap:10px;margin-top:1.5rem;align-items:stretch;">
      <button onclick="restart()" title="Пройти ще раз" style="flex-shrink:0;width:48px;min-height:48px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s ease;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">↺</button>
      <a href="https://linktr.ee/ntu_ftit" target="_blank" style="flex:1;padding:13px 16px;background:var(--accent);color:#fff;border-radius:12px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;line-height:1.4;">Дізнатись більше про факультет →</a>
    </div>`;
}

function showSplash() {
  const area = document.getElementById('quiz-area');
  const messages = ['Підбираємо котиків...', 'Зважуємо лапки...', 'Майже готово...'];
  let step = 0;
  area.innerHTML = `
    <div style="text-align:center; padding: 5rem 0;">
      <div style="font-size: 56px; margin-bottom: 1.5rem; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;">🐾</div>
      <div id="splash-msg" style="font-family:'Unbounded',sans-serif; font-size:13px; font-weight:600; color:var(--accent); margin-bottom:1.25rem; min-height:20px;">${messages[0]}</div>
      <div style="width:100%; height:5px; background:var(--accent-light); border-radius:3px; overflow:hidden;">
        <div id="splash-bar" style="height:100%; background:var(--accent); border-radius:3px; width:0%; transition:width 0.45s ease;"></div>
      </div>
    </div>`;

  const bar = document.getElementById('splash-bar');
  const msg = document.getElementById('splash-msg');
  const stepPcts = [33, 66, 100];

  setTimeout(() => { bar.style.width = '33%'; }, 50);

  const interval = setInterval(() => {
    step++;
    if (step < stepPcts.length) {
      bar.style.width = stepPcts[step] + '%';
      msg.textContent = messages[step];
    } else {
      clearInterval(interval);
      setTimeout(() => showIntro(), 350);
    }
  }, 550);
}

function showIntro() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <img src="${BASE_URL}/cats/Intro/intro.gif" alt="котик"
      style="width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;margin-bottom:1.25rem;display:block;background:var(--accent-light);">
    <div style="text-align:center;">
      <button class="restart-btn" onclick="render()">Поїхали 🐾</button>
      <div style="margin-top:1.25rem; border-top:1px solid var(--border); padding-top:1rem;">
        <p style="font-size:12px; color:var(--muted); line-height:1.6;"><em>Пам'ятай: будь-яка спеціальність ФТІТ може стати твоєю</em> 😸<br><em>Остаточний вибір завжди за тобою</em></p>
      </div>
    </div>`;
}

function restart() {
  current = 0;
  Object.keys(specs).forEach(k => scores[k] = 0);
  showIntro();
}

showSplash();
</script>
