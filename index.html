<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Який ти котик ФТІТ?</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EF;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #7A7A8C;
    --accent: #2F3D88;
    --accent-light: #E5E8F5;
    --border: rgba(26,26,46,0.1);
    --radius: 16px;
  }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    max-width: 560px;
  }

  .badge {
    display: inline-block;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: var(--accent);
    color: #fff;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.05);
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--accent-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'Unbounded', sans-serif;
  }

  .q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt-btn {
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    font-family: 'Geologica', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.5;
  }

  .opt-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(3px);
  }

  .opt-btn.picked {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: translateX(3px);
  }

  /* RESULT */
  .result-emoji {
    font-size: 56px;
    display: block;
    text-align: center;
    margin-bottom: 1rem;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }

  .result-name {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
    text-align: center;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .result-program {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .result-desc-box {
    background: var(--accent-light);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    font-size: 14px;
    line-height: 1.7;
    color: #2a3570;
    margin-bottom: 1.5rem;
  }

  .others-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Unbounded', sans-serif;
    margin-bottom: 10px;
  }

  .other-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .other-item:last-child { border-bottom: none; }

  .other-emoji { font-size: 18px; width: 24px; text-align: center; }

  .other-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }

  .other-bar-wrap {
    width: 80px;
    height: 5px;
    background: var(--accent-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .other-bar {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    opacity: 0.5;
  }

  .restart-btn {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 26px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 0.82; }

  .cat-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 1.25rem;
    display: block;
  }

  footer {
    margin-top: auto;
    padding-top: 2rem;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  @media (max-width: 480px) {
    .card { padding: 1.5rem; }
  }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 1.5rem 1.5rem 2rem;
    width: 100%; max-width: 560px;
    max-height: 85vh; overflow-y: auto;
    transform: translateY(40px);
    transition: transform 0.25s ease;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.25rem; }
  .modal-tag { display: inline-block; font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: var(--accent); color: #fff; border-radius: 100px; padding: 4px 12px; margin-bottom: 0.75rem; }
  .modal-title { font-family: 'Unbounded', sans-serif; font-size: clamp(14px, 4vw, 18px); font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 0.3rem; }
  .modal-spec { font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; }
  .modal-section { font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 1rem 0 0.5rem; }
  .modal-desc { font-size: 13px; line-height: 1.7; color: var(--text); margin-bottom: 0.5rem; }
  .modal-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.5rem; }
  .modal-badge { font-size: 12px; padding: 5px 11px; background: var(--accent-light); color: var(--accent); border-radius: 100px; border: 1px solid rgba(47,61,136,0.15); }
  .modal-list { list-style: none; padding: 0; margin: 0; }
  .modal-list li { font-size: 13px; color: var(--text); line-height: 1.6; padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-start; }
  .modal-list li:last-child { border-bottom: none; }
  .modal-list li::before { content: "·"; color: var(--accent); font-weight: 700; flex-shrink: 0; }
  .modal-close { display: block; width: 100%; padding: 14px; margin-top: 1.5rem; background: var(--text); color: #fff; border: none; border-radius: 12px; font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .modal-close:hover { opacity: 0.82; }
</style>
</head>

  // 1

Object.keys(specs).forEach(k => scores[k] = 0);

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function render() {
  const area = document.getElementById('quiz-area');
  if (current >= questions.length) { renderResult(area); return; }
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  let optionsHtml;
  if (q.mood) {
    let moodImgs = [];
    try {
      const res = await fetch(`${BASE_URL}/cats/mood/index.json`);
      if (res.ok) {
        const files = await res.json();
        const shuffled = files.sort(() => Math.random() - 0.5);
        moodImgs = shuffled.slice(0, 4).map(f => `${BASE_URL}/cats/mood/${f}`);
      }
    } catch {}
    if (!moodImgs.length) {
      moodImgs = [1,2,3,4].map(i => `https://cataas.com/cat?${Date.now() + i}`);
    }
    const moodOptions = q.options.length ? q.options : [{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}},{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}},{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}},{scores:{B13:1,F2:1,F3:1,G7:1,J8:1}}];
    optionsHtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${moodImgs.map((img, i) => `
        <button class="opt-btn" data-scores='${JSON.stringify(moodOptions[i]?.scores || moodOptions[0].scores)}' onclick="choose(this)" style="padding:0;overflow:hidden;border-radius:12px;aspect-ratio:1/1;background:var(--bg);">
          <img src="${img}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:10px;" alt="кіт ${i+1}">
        </button>`).join('')}
    </div>`;
  } else if (q.movie) {
    const shuffledMovie = shuffleArray(q.options);
    optionsHtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${shuffledMovie.map((o) => `
        <button class="opt-btn" data-scores='${JSON.stringify(o.scores)}' onclick="choose(this)" style="padding:0;overflow:hidden;border-radius:12px;aspect-ratio:2/3;background:var(--bg);">
          <img src="${o.img}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:10px;" alt="фільм">
        </button>`).join('')}
    </div>`;
  } else {
    const shuffled = shuffleArray(q.options);
    optionsHtml = `<div class="options">
      ${shuffled.map((o) => `<button class="opt-btn" data-scores='${JSON.stringify(o.scores)}' onclick="choose(this)">${o.text}</button>`).join('')}
    </div>`;
  }

  area.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${current + 1} / ${questions.length}</span>
    </div>
    <div class="q-text">${q.text}</div>
    ${optionsHtml}`;
}

function choose(btn) {
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btn.classList.add('picked');
  const s = JSON.parse(btn.dataset.scores);
  Object.entries(s).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  setTimeout(() => { current++; render(); }, 320);
}

async function getRandomCatImg(specKey) {
  try {
    const res = await fetch(`${BASE_URL}/cats/${specKey}/index.json`);
    if (!res.ok) return null;
    const files = await res.json();
    if (!files || !files.length) return null;
    const file = files[Math.floor(Math.random() * files.length)];
    return `${BASE_URL}/cats/${specKey}/${file}`;
  } catch {
    return null;
  }
}

function showSplash() {
  const area = document.getElementById('quiz-area');
  const messages = ['Підбираємо котиків...', 'Зважуємо лапки...', 'Майже готово...'];
  let step = 0;
  area.innerHTML = `
    <div style="text-align:center; padding: 5rem 0;">
      <div style="font-size: 56px; margin-bottom: 1.5rem; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;">🐾</div>
      <div id="splash-msg" style="font-family:'Unbounded',sans-serif; font-size:13px; font-weight:600; color:var(--accent); margin-bottom:1.25rem; min-height:20px;">${messages[0]}</div>
      <div style="width:100%; height:5px; background:var(--accent-light); border-radius:3px; overflow:hidden;">
        <div id="splash-bar" style="height:100%; background:var(--accent); border-radius:3px; width:0%; transition:width 0.45s ease;"></div>
      </div>
    </div>`;

  const bar = document.getElementById('splash-bar');
  const msg = document.getElementById('splash-msg');
  const stepPcts = [33, 66, 100];

  setTimeout(() => { bar.style.width = '33%'; }, 50);

  const interval = setInterval(() => {
    step++;
    if (step < stepPcts.length) {
      bar.style.width = stepPcts[step] + '%';
      msg.textContent = messages[step];
    } else {
      clearInterval(interval);
      setTimeout(() => showIntro(), 350);
    }
  }, 550);
}

function showIntro() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <img src="${BASE_URL}/cats/Intro/intro.gif" alt="котик"
      style="width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;margin-bottom:1.25rem;display:block;background:var(--accent-light);">
    <div style="text-align:center;">
      <button class="restart-btn" onclick="render()">Поїхали 🐾</button>
      <div style="margin-top:1.25rem; border-top:1px solid var(--border); padding-top:1rem;">
        <p style="font-size:12px; color:var(--muted); line-height:1.6;"><em>Пам'ятай: будь-яка спеціальність ФТІТ може стати твоєю</em> 😸<br><em>Остаточний вибір завжди за тобою</em></p>
      </div>
    </div>`;
}

function restart() {
  current = 0;
  Object.keys(specs).forEach(k => scores[k] = 0);
  showIntro();
}

function openModal(progName) {
  const data = programDetails[progName];
  if (!data) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-tag">${data.spec}</div>
    <div class="modal-title">${progName}</div>
    <div class="modal-spec">${data.kafedra}</div>
    <div class="modal-section">Коротко про програму</div>
    <p class="modal-desc">${data.korotko}</p>
    <div class="modal-section">Переваги програми</div>
    <ul class="modal-list">${data.perevahy.map(p => `<li>${p}</li>`).join('')}</ul>
    <div class="modal-section">Потенційні посади</div>
    <div class="modal-badges">${data.posady.map(p => `<span class="modal-badge">${p}</span>`).join('')}</div>
    <div class="modal-section">Основні дисципліни</div>
    <ul class="modal-list">${data.dystsypliny.map(d => `<li>${d}</li>`).join('')}</ul>
    <div class="modal-section">Ключові навички випускників</div>
    <p class="modal-desc">${data.navychky}</p>
    <div class="modal-section">Місця проходження практики</div>
    <div class="modal-badges">${data.praktyka.map(p => `<span class="modal-badge">${p}</span>`).join('')}</div>
  `;
  // скролимо на початок перед відкриттям
  const sheet = document.querySelector('.modal-sheet');
  sheet.scrollTop = 0;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── свайп вниз для закриття ──────────────────────────────────────────
(function() {
  let startY = 0, currentY = 0, isDragging = false;
  const getSheet = () => document.querySelector('.modal-sheet');

  document.addEventListener('touchstart', function(e) {
    const sheet = getSheet();
    if (!sheet) return;
    const handle = sheet.querySelector('.modal-handle');
    // дозволяємо свайп тільки якщо торкнулись верхньої частини (перші 60px) або хендлу
    const touch = e.touches[0];
    const rect = sheet.getBoundingClientRect();
    if (touch.clientY - rect.top > 60) return;
    startY = touch.clientY;
    isDragging = true;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    const sheet = getSheet();
    if (!sheet) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if (diff > 0) {
      sheet.style.transform = `translateY(${diff}px)`;
      sheet.style.transition = 'none';
    }
  }, { passive: true });

  document.addEventListener('touchend', function() {
    if (!isDragging) return;
    isDragging = false;
    const sheet = getSheet();
    if (!sheet) return;
    const diff = currentY - startY;
    sheet.style.transition = 'transform 0.25s ease';
    if (diff > 80) {
      closeModal();
      setTimeout(() => { sheet.style.transform = ''; }, 300);
    } else {
      sheet.style.transform = 'translateY(0)';
    }
  });
})();

showSplash();
</script>

    <button class="modal-close" onclick="closeModal()">Закрити</button>
  </div>
</div>
